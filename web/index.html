<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6efe4">
  <title>GlutenScanner Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">Gluten-aware dining</p>
        <h1 id="screen-title">Gluten-Friendly</h1>
      </div>
      <button id="home-reset" class="icon-button" aria-label="Return to home">Home</button>
    </header>

    <main id="app"></main>

    <nav class="tab-bar" aria-label="Primary">
      <button class="tab-button is-active" data-tab="home">Home</button>
      <button class="tab-button" data-tab="history">History</button>
      <button class="tab-button" data-tab="preferences">Preferences</button>
    </nav>
  </div>

  <div id="camera-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-panel camera-panel">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Live capture</p>
          <h2>Scan a menu</h2>
        </div>
        <button id="close-camera" class="icon-button" aria-label="Close scanner">Close</button>
      </div>
      <div class="camera-frame">
        <video id="camera-video" autoplay playsinline muted></video>
        <div class="camera-guide"></div>
      </div>
      <p class="helper">Frame the menu tightly and keep glare low for the cleanest OCR result.</p>
      <div class="action-row">
        <button id="capture-photo" class="primary-button">Capture menu</button>
        <button id="camera-fallback" class="secondary-button">Use photo upload instead</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <input id="photo-input" type="file" accept="image/*" hidden>
  <input id="camera-input" type="file" accept="image/*" capture="environment" hidden>
  <input id="document-input" type="file" accept="image/*,.pdf" hidden>
  <canvas id="capture-canvas" hidden></canvas>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
